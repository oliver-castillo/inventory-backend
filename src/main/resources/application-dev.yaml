spring:
  datasource:
    url: jdbc:sqlite:data/inventory.db
    username: sa
    password: 1234
    driverClassName: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: create-drop

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html